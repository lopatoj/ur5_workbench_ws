controller_manager:
  ros__parameters:
    update_rate: 125 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - thing1_shoulder_pan_joint
      - thing1_shoulder_lift_joint
      - thing1_elbow_joint
      - thing1_wrist_1_joint
      - thing1_wrist_2_joint
      - thing1_wrist_3_joint
      - thing1_robotiq_85_left_knuckle_joint
      - thing2_shoulder_pan_joint
      - thing2_shoulder_lift_joint
      - thing2_elbow_joint
      - thing2_wrist_1_joint
      - thing2_wrist_2_joint
      - thing2_wrist_3_joint
      - thing2_robotiq_85_left_knuckle_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
